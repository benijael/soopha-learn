<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement — SooPHA Learn</title>
<link rel="stylesheet" href="../css/global.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<style>
.page { padding: 2.5rem 0 4rem; }

.page-hero {
  background: rgba(0,255,136,0.03);
  border-bottom: 1px solid var(--green-border);
  padding: 2rem 0;
  margin-bottom: 2.5rem;
}
.page-hero-inner {
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.page-hero h1 { margin-bottom: 0.3rem; }
.page-hero p { font-family: var(--mono); font-size: 0.72rem; color: rgba(0,255,136,0.4); letter-spacing: 0.15em; }

/* PODIUM */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 1rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
.podium-item { text-align: center; flex: 1; min-width: 140px; max-width: 220px; }
.podium-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-weight: 900; font-size: 1.4rem;
  margin: 0 auto 0.6rem;
  border: 2px solid; overflow: hidden;
}
.podium-rank { font-size: 2rem; margin-bottom: 0.3rem; line-height: 1; }
.podium-name { font-family: var(--display); font-size: 0.85rem; font-weight: 700; color: #fff; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
.podium-country { font-size: 0.9rem; margin-bottom: 0.3rem; }
.podium-score { font-family: var(--display); font-size: 1.1rem; font-weight: 900; }
.podium-courses { font-family: var(--mono); font-size: 0.6rem; color: rgba(0,255,136,0.35); letter-spacing: 0.1em; }
.podium-bar {
  margin-top: 0.8rem;
  border: 1px solid;
  background: rgba(0,255,136,0.03);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.1em;
  position: relative;
}
.podium-item.p1 .podium-avatar { background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.5); color: #ffd700; }
.podium-item.p1 .podium-score  { color: #ffd700; text-shadow: 0 0 12px #ffd700; }
.podium-item.p1 .podium-bar    { height: 80px; border-color: rgba(255,215,0,0.3); color: rgba(255,215,0,0.5); }
.podium-item.p2 .podium-avatar { background: rgba(192,192,192,0.1); border-color: rgba(192,192,192,0.4); color: #c0c0c0; }
.podium-item.p2 .podium-score  { color: #c0c0c0; }
.podium-item.p2 .podium-bar    { height: 60px; border-color: rgba(192,192,192,0.2); color: rgba(192,192,192,0.4); }
.podium-item.p3 .podium-avatar { background: rgba(205,127,50,0.1); border-color: rgba(205,127,50,0.4); color: #cd7f32; }
.podium-item.p3 .podium-score  { color: #cd7f32; }
.podium-item.p3 .podium-bar    { height: 44px; border-color: rgba(205,127,50,0.2); color: rgba(205,127,50,0.4); }

/* LEADERBOARD TABLE */
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table thead tr {
  border-bottom: 1px solid var(--green-border);
}
.lb-table thead th {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em;
  color: rgba(0,255,136,0.3); text-transform: uppercase;
  padding: 0.6rem 1rem; text-align: left; font-weight: 400;
}
.lb-table thead th:last-child { text-align: right; }
.lb-row-data {
  border-bottom: 1px solid rgba(0,255,136,0.05);
  transition: background 0.15s;
}
.lb-row-data:hover { background: rgba(0,255,136,0.03); }
.lb-row-data.is-me { background: rgba(0,255,136,0.06); border-color: rgba(0,255,136,0.15); }
.lb-row-data td { padding: 0.75rem 1rem; }
.lb-rank-cell { font-family: var(--display); font-size: 0.85rem; font-weight: 700; min-width: 40px; }
.lb-user-cell { display: flex; align-items: center; gap: 0.8rem; }
.lb-mini-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,255,136,0.08); border: 1px solid var(--green-border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-weight: 700; font-size: 0.75rem; color: var(--green);
  flex-shrink: 0; overflow: hidden;
}
.lb-mini-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.podium-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.lb-username { font-family: var(--mono); font-size: 0.78rem; color: rgba(200,255,220,0.85); }
.lb-you-badge { font-family: var(--mono); font-size: 0.55rem; padding: 0.15rem 0.4rem; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.25); color: var(--green); margin-left: 0.4rem; letter-spacing: 0.08em; }
.lb-country-cell { font-size: 1rem; }
.lb-courses-cell { font-family: var(--mono); font-size: 0.7rem; color: rgba(0,255,136,0.4); }
.lb-score-cell { font-family: var(--display); font-size: 0.9rem; font-weight: 700; color: var(--green); text-align: right; }
.lb-score-bar { height: 3px; background: rgba(0,255,136,0.08); border-radius: 2px; margin-top: 0.25rem; overflow: hidden; }
.lb-score-bar-fill { height: 100%; background: var(--green); box-shadow: 0 0 4px var(--green); }

/* MY RANK BANNER */
.my-rank-banner {
  padding: 1rem 1.5rem;
  background: rgba(0,255,136,0.04);
  border: 1px solid rgba(0,255,136,0.15);
  border-left: 4px solid var(--green);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
  margin-bottom: 1.5rem;
}
.my-rank-label { font-family: var(--mono); font-size: 0.65rem; color: rgba(0,255,136,0.4); letter-spacing: 0.1em; margin-bottom: 0.2rem; }
.my-rank-val { font-family: var(--display); font-size: 1.4rem; font-weight: 900; color: var(--green); }

/* FILTER TABS */
.filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.filter-tab { font-family: var(--mono); font-size: 0.65rem; padding: 0.35rem 0.9rem; cursor: pointer; border: 1px solid var(--green-border); color: rgba(0,255,136,0.4); letter-spacing: 0.08em; transition: all 0.2s; background: transparent; }
.filter-tab:hover, .filter-tab.active { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.06); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 3rem 1rem; font-family: var(--mono); font-size: 0.75rem; color: rgba(0,255,136,0.25); letter-spacing: 0.1em; }

@media (max-width: 600px) {
  .lb-table thead th:nth-child(3),
  .lb-table tbody td:nth-child(3),
  .lb-table thead th:nth-child(4),
  .lb-table tbody td:nth-child(4) { display: none; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="navbar-brand">SooPHA <span>LEARN</span></a>
  <div class="navbar-links">
    <a href="dashboard.html" class="navbar-link">Dashboard</a>
    <a href="formations.html" class="navbar-link hide-mobile">Formations</a>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span>Chargement...</span>
</div>

<div id="page-content" style="display:none">

  <div class="page-hero">
    <div class="container">
      <div class="page-hero-inner">
        <div>
          <h1>CLASSEMENT</h1>
          <p>// Top apprenants · SooPHA Learn · Afrique Francophone</p>
        </div>
        <div style="display:flex;gap:1.5rem">
          <div style="text-align:center">
            <div class="stat-val" id="stat-players" style="font-size:1.6rem">—</div>
            <div class="stat-label">Apprenants</div>
          </div>
          <div style="text-align:center">
            <div class="stat-val" id="stat-completions" style="font-size:1.6rem">—</div>
            <div class="stat-label">Cours terminés</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="page">
    <div class="container">

      <!-- PODIUM TOP 3 -->
      <div class="podium" id="podium"></div>

      <!-- MON CLASSEMENT -->
      <div class="my-rank-banner" id="my-rank-banner" style="display:none">
        <div>
          <div class="my-rank-label">// TON CLASSEMENT</div>
          <div class="my-rank-val" id="my-rank-val">—</div>
        </div>
        <div style="display:flex;gap:2rem">
          <div style="text-align:center">
            <div style="font-family:var(--display);font-size:1.1rem;font-weight:700;color:#fff" id="my-score-val">—</div>
            <div style="font-family:var(--mono);font-size:0.6rem;color:rgba(0,255,136,0.35)">SCORE MOY.</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:var(--display);font-size:1.1rem;font-weight:700;color:#fff" id="my-courses-val">—</div>
            <div style="font-family:var(--mono);font-size:0.6rem;color:rgba(0,255,136,0.35)">COURS</div>
          </div>
        </div>
      </div>

      <!-- FILTER -->
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterBy('all', this)">🌍 Tous</button>
        <button class="filter-tab" onclick="filterBy('GA', this)">🇬🇦 Gabon</button>
        <button class="filter-tab" onclick="filterBy('SN', this)">🇸🇳 Sénégal</button>
        <button class="filter-tab" onclick="filterBy('CI', this)">🇨🇮 Côte d'Ivoire</button>
        <button class="filter-tab" onclick="filterBy('CM', this)">🇨🇲 Cameroun</button>
        <button class="filter-tab" onclick="filterBy('MA', this)">🇲🇦 Maroc</button>
        <button class="filter-tab" onclick="filterBy('FR', this)">🇫🇷 France</button>
      </div>

      <!-- TABLE -->
      <div class="card" style="padding:0;overflow:hidden">
        <table class="lb-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Apprenant</th>
              <th>Pays</th>
              <th>Cours</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="lb-tbody">
            <tr><td colspan="5"><div class="empty-state">Chargement...</div></td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>
var currentUser = null;
var allRows = [];
var myUserId = null;

var countryFlags = {
  'GA':'🇬🇦','SN':'🇸🇳','CI':'🇨🇮','CM':'🇨🇲','CD':'🇨🇩','CG':'🇨🇬',
  'MG':'🇲🇬','ML':'🇲🇱','BF':'🇧🇫','NE':'🇳🇪','TG':'🇹🇬','BJ':'🇧🇯',
  'GN':'🇬🇳','TN':'🇹🇳','MA':'🇲🇦','DZ':'🇩🇿','FR':'🇫🇷'
};

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  myUserId = currentUser.id;

  // Aggregate scores par user depuis course_completions
  const { data: completions } = await supabase
    .from('course_completions')
    .select('user_id, score_pct, profiles(username, country, display_name, avatar_url)');

  if (!completions || completions.length === 0) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';
    renderTable([]);
    return;
  }

  // Agréger par user
  var userMap = {};
  completions.forEach(function(row) {
    if (!row.profiles) return;
    var uid = row.user_id;
    if (!userMap[uid]) {
      userMap[uid] = {
        user_id: uid,
        username: row.profiles.username || 'user',
        display_name: row.profiles.display_name || row.profiles.username || 'Apprenant',
        country: row.profiles.country || '',
        avatar_url: row.profiles.avatar_url || null,
        scores: [],
        courses: 0
      };
    }
    userMap[uid].scores.push(row.score_pct);
    userMap[uid].courses++;
  });

  // Fetch avatar_url séparé — plus fiable que le join
  var userIds = Object.keys(userMap);
  if (userIds.length > 0) {
    var { data: profilesData } = await supabase
      .from('profiles')
      .select('id, avatar_url')
      .in('id', userIds);
    if (profilesData) {
      profilesData.forEach(function(p) {
        if (userMap[p.id] && p.avatar_url) {
          userMap[p.id].avatar_url = p.avatar_url;
        }
      });
    }
  }

  // Calculer score moyen et trier
  allRows = Object.values(userMap).map(function(u) {
    var avg = u.scores.reduce(function(a,b){ return a+b; }, 0) / u.scores.length;
    return Object.assign(u, { avg: Math.round(avg) });
  }).sort(function(a,b){ return b.avg - a.avg || b.courses - a.courses; });

  // Stats globales
  document.getElementById('stat-players').textContent = allRows.length;
  document.getElementById('stat-completions').textContent = completions.length;

  // Mon classement
  var myRank = allRows.findIndex(function(r){ return r.user_id === myUserId; });
  if (myRank !== -1) {
    var me = allRows[myRank];
    document.getElementById('my-rank-banner').style.display = 'flex';
    document.getElementById('my-rank-val').textContent = '#' + (myRank + 1) + ' / ' + allRows.length;
    document.getElementById('my-score-val').textContent = me.avg + '%';
    document.getElementById('my-courses-val').textContent = me.courses;
  }

  // Fetch avatars séparément (plus fiable que le join)
  var userIds = allRows.map(function(r){ return r.user_id; });
  var avatarMap = {};
  try {
    var { data: profData } = await supabase
      .from('profiles')
      .select('id, avatar_url')
      .in('id', userIds);
    if (profData) {
      profData.forEach(function(p){
        if (p.avatar_url) avatarMap[p.id] = p.avatar_url;
      });
    }
  } catch(e) {}

  // Injecter les avatars dans allRows
  allRows.forEach(function(r){
    r.avatar_url = avatarMap[r.user_id] || null;
  });

  // Podium top 3
  renderPodium(allRows.slice(0, 3));

  // Table complète
  renderTable(allRows);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('page-content').style.display = 'block';
}

function renderPodium(top) {
  var podiumEl = document.getElementById('podium');
  if (top.length === 0) { podiumEl.innerHTML = ''; return; }

  var order = [1, 0, 2]; // afficher 2e, 1er, 3e
  var classes = ['p2','p1','p3'];
  var rankEmojis = ['🥇','🥈','🥉'];

  var html = '';
  order.forEach(function(i, pos) {
    if (!top[i]) return;
    var u = top[i];
    var flag = countryFlags[u.country] || '';
    var initial = (u.display_name || u.username || '?').charAt(0).toUpperCase();
    var avatarContent = u.avatar_url
      ? '<img src="' + u.avatar_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%">'
      : initial;
    html += '<div class="podium-item ' + classes[pos] + '">' +
      '<div class="podium-rank">' + rankEmojis[i] + '</div>' +
      '<div class="podium-avatar">' + avatarContent + '</div>' +
      '<div class="podium-name">@' + u.username + '</div>' +
      '<div class="podium-country">' + flag + '</div>' +
      '<div class="podium-score">' + u.avg + '%</div>' +
      '<div class="podium-courses">' + u.courses + ' cours</div>' +
      '<div class="podium-bar">' + (i === 0 ? '1er' : i === 1 ? '2e' : '3e') + '</div>' +
      '</div>';
  });
  podiumEl.innerHTML = html;
}

function renderTable(rows) {
  var tbody = document.getElementById('lb-tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">// Aucun apprenant pour le moment.<br>Sois le premier ! 🚀</div></td></tr>';
    return;
  }

  var html = '';
  rows.forEach(function(u, i) {
    var rank = i + 1;
    var flag = countryFlags[u.country] || '🌍';
    var initial = (u.display_name || u.username || '?').charAt(0).toUpperCase();
    var isMe = u.user_id === myUserId;
    var rankDisplay = rank <= 3
      ? ['🥇','🥈','🥉'][rank-1]
      : '<span style="color:rgba(0,255,136,0.4)">' + rank + '</span>';
    var miniAvatar = u.avatar_url
      ? '<img src="' + u.avatar_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%">'
      : initial;

    html += '<tr class="lb-row-data' + (isMe ? ' is-me' : '') + '">' +
      '<td class="lb-rank-cell">' + rankDisplay + '</td>' +
      '<td><div class="lb-user-cell">' +
        '<div class="lb-mini-avatar">' + miniAvatar + '</div>' +
        '<span class="lb-username">@' + u.username + '</span>' +
        (isMe ? '<span class="lb-you-badge">MOI</span>' : '') +
      '</div></td>' +
      '<td class="lb-country-cell">' + flag + '</td>' +
      '<td class="lb-courses-cell">' + u.courses + ' cours</td>' +
      '<td class="lb-score-cell">' +
        u.avg + '%' +
        '<div class="lb-score-bar"><div class="lb-score-bar-fill" style="width:' + u.avg + '%"></div></div>' +
      '</td>' +
      '</tr>';
  });
  tbody.innerHTML = html;
}

function filterBy(country, btn) {
  document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  var filtered = country === 'all'
    ? allRows
    : allRows.filter(function(r){ return r.country === country; });
  renderTable(filtered);
  if (country === 'all') renderPodium(allRows.slice(0, 3));
  else renderPodium(filtered.slice(0, 3));
}

init();
</script>
</body>
</html>
